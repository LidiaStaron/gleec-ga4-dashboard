<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GA4 Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root {
    --ink: #10151c;
    --panel: #161d27;
    --panel-line: #262f3c;
    --text: #e7ecf3;
    --text-dim: #8b98a9;
    --accent: #4fd1c5;
    --accent-soft: rgba(79, 209, 197, 0.12);
    --up: #4fd1c5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--ink);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 40px 24px 80px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 36px;
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 6px;
    font-weight: 600;
  }
  h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 650;
    letter-spacing: -0.01em;
  }
  #updated {
    font-size: 13px;
    color: var(--text-dim);
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 12px;
    padding: 20px 22px;
  }
  .card .label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .card .value {
    font-size: 32px;
    font-weight: 650;
    font-variant-numeric: tabular-nums;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .panel h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 0 0 18px;
    font-weight: 600;
  }
  canvas { max-height: 260px; }

  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left;
    padding: 10px 6px;
    font-size: 14px;
    border-bottom: 1px solid var(--panel-line);
  }
  th {
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }

  .empty {
    color: var(--text-dim);
    font-size: 14px;
    padding: 12px 0;
  }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 40px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <p class="eyebrow">Live · Auto-refreshing</p>
        <h1>GA4 Dashboard</h1>
      </div>
      <div id="updated">Loading…</div>
    </header>

    <div class="cards">
      <div class="card">
        <div class="label">Active users · 7d</div>
        <div class="value" id="metric-users">–</div>
      </div>
      <div class="card">
        <div class="label">Sessions · 7d</div>
        <div class="value" id="metric-sessions">–</div>
      </div>
      <div class="card">
        <div class="label">Pageviews · 7d</div>
        <div class="value" id="metric-pageviews">–</div>
      </div>
    </div>

    <div class="panel">
      <h2>Active users — last 14 days</h2>
      <canvas id="trendChart"></canvas>
    </div>

    <div class="panel">
      <h2>Top pages — last 7 days</h2>
      <table id="pagesTable">
        <thead>
          <tr><th>Page</th><th style="text-align:right">Views</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="empty" id="pagesEmpty" style="display:none;">No page data yet.</div>
    </div>

    <footer>Data refreshes automatically via GitHub Actions.</footer>
  </div>

<script>
  async function loadData() {
    try {
      const res = await fetch('data/latest.json?_=' + Date.now());
      if (!res.ok) throw new Error('No data file yet');
      const data = await res.json();
      render(data);
    } catch (err) {
      document.getElementById('updated').textContent =
        'No data yet — the first Action run will populate this.';
    }
  }

  function fmt(n) {
    return new Intl.NumberFormat('en-US').format(n);
  }

  function render(data) {
    const updated = new Date(data.updated_at);
    document.getElementById('updated').textContent =
      'Updated ' + updated.toLocaleString();

    const s = data.summary_last_7_days || {};
    document.getElementById('metric-users').textContent = fmt(s.activeUsers ?? 0);
    document.getElementById('metric-sessions').textContent = fmt(s.sessions ?? 0);
    document.getElementById('metric-pageviews').textContent = fmt(s.screenPageViews ?? 0);

    const trend = data.daily_trend_14_days || [];
    const labels = trend.map(d => d.date.slice(4, 6) + '/' + d.date.slice(6, 8));
    const values = trend.map(d => d.activeUsers);

    new Chart(document.getElementById('trendChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: '#4fd1c5',
          backgroundColor: 'rgba(79, 209, 197, 0.12)',
          fill: true,
          tension: 0.35,
          pointRadius: 0,
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#8b98a9' } },
          y: { grid: { color: '#262f3c' }, ticks: { color: '#8b98a9' } },
        },
      },
    });

    const pages = data.top_pages_last_7_days || [];
    const tbody = document.querySelector('#pagesTable tbody');
    tbody.innerHTML = '';
    if (pages.length === 0) {
      document.getElementById('pagesEmpty').style.display = 'block';
    } else {
      pages.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${p.page}</td><td class="num">${fmt(p.views)}</td>`;
        tbody.appendChild(tr);
      });
    }
  }

  loadData();
</script>
</body>
</html>
