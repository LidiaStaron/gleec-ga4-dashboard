name: Update GA4 Dashboard

on:
  schedule:
    # Runs at the top of every hour. Adjust as needed.
    - cron: "0 * * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: echo "$GA4_SERVICE_ACCOUNT_KEY" > service-account.json
        env:
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}

      - name: Fetch GA4 data
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_APPLICATION_CREDS: service-account.json
        run: python fetch_ga4_data.py

      - name: Remove service account key
        if: always()
        run: rm -f service-account.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          git diff --staged --quiet || git commit -m "Update GA4 dashboard data"
          git push
